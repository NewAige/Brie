<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brie — Prompt Library</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- No external assets of any kind: no CDN scripts, no web fonts.
         The browser must never reach a non-internal host (spec §8). -->
    <script>
      // Apply the saved theme before first paint so dark mode never flashes
      // white on load. Kept inline (not an external asset) per spec §8.
      try {
        if (localStorage.getItem('brie-theme') === 'dark') {
          document.documentElement.dataset.theme = 'dark'
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
