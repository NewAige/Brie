server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API and OAuth endpoints go to the backend container. Same origin for
    # the browser, so the httpOnly session cookie just works — no CORS.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /auth/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /healthz {
        proxy_pass http://backend:8000;
    }

    # Static SPA — everything else falls back to index.html.
    location / {
        try_files $uri /index.html;
    }
}
